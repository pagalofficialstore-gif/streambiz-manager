<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1420">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glownest Media">
<title>Glownest Media</title>
<style>
  :root{
    --bg:#0f1420; --panel:#161d2b; --panel2:#1c2536; --border:#2a3548;
    --text:#e8ecf4; --muted:#8b96ab; --accent:#4f8cff; --accent2:#3ecf8e;
    --danger:#ff5c5c; --warn:#ffb84f;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
  .app{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);padding:18px 12px;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;}
  .brand{font-size:16px;font-weight:700;margin:4px 8px 20px;color:var(--text);}
  .brand span{color:var(--accent);}
  .nav-item{position:relative;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--muted);cursor:pointer;font-size:14px;margin-bottom:2px;user-select:none;}
  .nav-item:hover{background:var(--panel2);color:var(--text);}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-badge{position:absolute;top:2px;right:6px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:10px;min-width:16px;height:16px;line-height:16px;text-align:center;padding:0 4px;}
  .main{margin-left:220px;flex:1;padding:24px 32px;max-width:1200px;}
  h1{font-size:22px;margin:0 0 4px;}
  h2{font-size:17px;margin:0 0 14px;}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:24px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .card .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .card .value{font-size:22px;font-weight:700;}
  .card .value.pos{color:var(--accent2);}
  .card .value.neg{color:var(--danger);}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:20px;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .row-actions{display:flex;gap:8px;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-size:13.5px;cursor:pointer;font-weight:600;}
  .btn:hover{opacity:.9;}
  .btn.secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text);}
  .btn.danger{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:5px 10px;font-size:12px;}
  .btn.small{padding:5px 10px;font-size:12px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:7px;font-size:13.5px;font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:1px solid var(--accent);}
  textarea{resize:vertical;min-height:60px;}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);}
  .pill.income{color:var(--accent2);border-color:var(--accent2);}
  .pill.expense{color:var(--danger);border-color:var(--danger);}
  .empty{color:var(--muted);font-size:13.5px;padding:20px 0;text-align:center;}
  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);}
  .tabbtn{padding:9px 14px;color:var(--muted);cursor:pointer;font-size:13.5px;border-bottom:2px solid transparent;}
  .tabbtn.active{color:var(--text);border-color:var(--accent);}
  select[multiple]{min-height:80px;}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;align-items:center;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:22px;width:440px;max-width:92vw;max-height:88vh;overflow-y:auto;}
  .modal h3{margin-top:0;}
  .field-row{display:flex;gap:10px;}
  .field-row > div{flex:1;}
  .chart-wrap{overflow-x:auto;}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .filters select,.filters input{width:auto;min-width:140px;}
  .note{color:var(--muted);font-size:12px;margin-top:6px;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
  .backup-box{display:flex;gap:10px;flex-wrap:wrap;}
  .stat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12.5px;}
  .stat-bar-row .lbl{width:90px;color:var(--muted);flex-shrink:0;}
  .stat-bar-track{flex:1;background:var(--bg);border-radius:5px;height:10px;overflow:hidden;}
  .stat-bar-fill{height:100%;border-radius:5px;}
  .stat-bar-val{width:90px;text-align:right;flex-shrink:0;}
  body.pre-auth .sidebar{display:none;}
  body.pre-auth .main{margin-left:0;max-width:420px;margin-top:60px;margin-right:auto;margin-bottom:60px;}
  #userBadge{cursor:pointer;}
  #userBadge:hover{color:var(--text);}
  .pill.pending{color:var(--warn);border-color:var(--warn);}
  tr.pending-row td{background:rgba(255,184,79,0.05);}
  /* ---------- Tablet: keep sidebar but slim it down to icons ---------- */
  @media(max-width:820px) and (min-width:601px){
    .sidebar{width:64px;padding:14px 6px;}
    .sidebar .label-text{display:none;}
    .brand{display:none;}
    .main{margin-left:64px;padding:18px;}
  }
  /* ---------- Phone: app-style bottom tab bar, full-width content ---------- */
  @media(max-width:600px){
    body{padding-bottom:env(safe-area-inset-bottom);}
    .app{display:block;}
    .brand{display:none;}
    .sidebar{
      position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;height:auto;
      display:flex;flex-direction:row;align-items:stretch;justify-content:space-between;
      overflow-x:auto;overflow-y:hidden;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
      border-right:none;border-top:1px solid var(--border);
      z-index:40;-webkit-overflow-scrolling:touch;
    }
    #cloudBadge{display:none;}
    .nav-item{
      flex:1 0 auto;flex-direction:column;justify-content:center;align-items:center;
      gap:2px;padding:8px 4px;margin-bottom:0;border-radius:10px;font-size:19px;min-width:52px;
    }
    .nav-item .label-text{display:block;font-size:9.5px;line-height:1;font-weight:600;letter-spacing:.01em;}
    .nav-item.active{background:var(--panel2);color:var(--accent);}
    .main{margin-left:0;padding:16px 14px 84px;max-width:100%;}
    h1{font-size:19px;}
    .cards{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
    .card{padding:12px;}
    .card .value{font-size:18px;}
    .toolbar{flex-direction:column;align-items:stretch;}
    .toolbar > div{width:100%;}
    .toolbar .btn, .toolbar .backup-box .btn, .backup-box{width:100%;}
    .backup-box{flex-direction:column;}
    .backup-box .btn{width:100%;}
    table{min-width:560px;}
    .modal-bg{align-items:flex-end;}
    .modal{
      width:100%;max-width:100%;border-radius:16px 16px 0 0;
      max-height:92vh;padding:18px;padding-bottom:calc(18px + env(safe-area-inset-bottom));
    }
    .field-row{flex-direction:column;}
    .field-row > div{width:100%;}
    input,select,textarea,.btn{font-size:16px;} /* prevents iOS auto-zoom on focus */
    .modal > div[style*="justify-content:flex-end"]{flex-direction:column-reverse;}
    .modal > div[style*="justify-content:flex-end"] .btn{width:100%;}
    .row-actions{flex-wrap:wrap;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">Glownest<span> Media</span></div>
    <div class="nav-item active" data-tab="dashboard">📊 <span class="label-text">Dashboard</span></div>
    <div class="nav-item" data-tab="events">🎬 <span class="label-text">Events</span></div>
    <div class="nav-item" data-tab="income">💰 <span class="label-text">Income</span></div>
    <div class="nav-item" data-tab="expenses">🧾 <span class="label-text">Expenses</span><span id="expenseNavBadge" class="nav-badge" style="display:none;"></span></div>
    <div class="nav-item" data-tab="investments">📦 <span class="label-text">Investments</span><span id="investmentNavBadge" class="nav-badge" style="display:none;"></span></div>
    <div class="nav-item" data-tab="staff">👥 <span class="label-text">Staff & Salaries</span></div>
    <div class="nav-item" data-tab="reports">📈 <span class="label-text">Reports</span></div>
    <div class="nav-item" data-tab="settings">⚙️ <span class="label-text">Backup / Settings</span></div>
    <div id="cloudBadge" class="note label-text" style="margin:14px 8px 0;line-height:1.4;"></div>
    <div id="userBadge" class="note label-text" style="margin:6px 8px 0;line-height:1.4;"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<script>
/* ============================================================
   GLOWNEST MEDIA — single-file offline business tracker
   Data persists in this browser via localStorage.
   Use Backup / Settings tab to export/import a JSON backup file.
   (Internal storage keys still say "streambiz" — this app was
   originally built under that name; renaming those keys would wipe
   out everyone's existing saved data, so they're left as-is.)
   ============================================================ */

const CURRENCY = '₹';
const STORAGE_KEY = 'streambiz_data_v1';

const INCOME_CATEGORIES = ['YouTube AdSense','Sponsorship','Ticket Sales','Super Chat / Donations','Client Payment','Other Income'];
const EXPENSE_CATEGORIES = ['Travel','Equipment Rental','Venue / Permits','Editing / Post-production','Marketing','Internet / Data','Food & Accommodation','Software / Subscriptions','Misc'];
// Event categories are fully user-defined (see DATA.eventTypes) — no built-in presets.
const SALARY_TYPES = ['Monthly','Per Event','One-time'];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function fmt(n){
  n = Number(n)||0;
  const neg = n < 0;
  n = Math.abs(n);
  let s = n.toLocaleString('en-IN',{maximumFractionDigits:2, minimumFractionDigits: (n%1!==0?2:0)});
  return (neg?'-':'') + CURRENCY + s;
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function monthKey(dateStr){ return (dateStr||'').slice(0,7); }
function monthLabel(key){
  if(!key) return '';
  const [y,m] = key.split('-');
  const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return names[parseInt(m,10)-1] + ' ' + y;
}
function escapeHtml(str){
  return String(str??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- Data layer ----------
// This device's Firebase connection is baked in as the default, so any copy
// of this file opened on a new device syncs immediately with no manual setup.
// The Settings screen shows these as locked (read-only) fields.
const DEFAULT_CLOUD_SYNC = {
  url: 'https://streambiz-manager-default-rtdb.firebaseio.com',
  code: 'aaa64daf-4a82-47aa-9153-9628ee7fdff5',
  enabled: true,
  locked: true,
};
const DEFAULT_SHEET_SYNC = { url: '', enabled: false };
function blankData(){
  return {
    events:[], income:[], expenses:[], investments:[], staff:[], salaryPayments:[],
    settings:{youtubeApiKey:'', cloudSync:{...DEFAULT_CLOUD_SYNC}, sheetSync:{...DEFAULT_SHEET_SYNC}},
    eventTypes:[], partners:[], updatedAt: null,
  };
}
// Firebase's REST API omits keys that hold empty arrays/objects/null, so data
// pulled from the cloud (or loaded from an older/partial local save) can be
// missing fields entirely. This backfills every expected field with a safe
// default so the rest of the app can assume they always exist.
function normalizeData(d){
  d = d && typeof d==='object' ? d : {};
  d.events ||= []; d.income ||= []; d.expenses ||= [];
  d.investments ||= []; d.staff ||= []; d.salaryPayments ||= [];
  d.settings ||= {}; d.settings.youtubeApiKey ||= '';
  if(!d.settings.cloudSync || !d.settings.cloudSync.url){
    d.settings.cloudSync = {...DEFAULT_CLOUD_SYNC};
  }
  d.settings.sheetSync ||= {...DEFAULT_SHEET_SYNC};
  d.eventTypes ||= [];
  d.partners ||= [];
  // Partners used to be plain name strings; migrate to {name, pin} objects
  // so each partner can log in on their own device.
  d.partners = d.partners.map(p => typeof p==='string' ? {name:p, pin:''} : p);
  d.updatedAt ||= null;
  return d;
}
function loadData(){
  let raw;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){ raw = null; }
  if(!raw){
    return blankData();
  }
  try{
    const d = JSON.parse(raw);
    return normalizeData(d);
  }catch(e){
    return blankData();
  }
}
let DATA = loadData();
let cloudSyncTimer = null;
function save(){
  DATA.updatedAt = Date.now();
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }
  catch(e){ alert('Could not save data. Your browser storage may be full or blocked.'); }
  scheduleCloudPush();
  scheduleSheetPush();
}

// ============================================================
// CLOUD SYNC (optional, multi-device) — uses a free Firebase Realtime
// Database the user sets up themselves, via its plain REST API (no SDK,
// no login flow). Sync is "last write wins": whichever device saved most
// recently (by updatedAt) is what both devices end up with.
// ============================================================
function cloudSyncConfigured(){
  const cs = DATA.settings && DATA.settings.cloudSync;
  return !!(cs && cs.url && cs.code);
}
function cloudUrl(){
  const cs = DATA.settings.cloudSync;
  return cs.url.replace(/\/+$/,'') + '/streambiz/' + encodeURIComponent(cs.code) + '.json';
}
function generateSyncCode(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return uid()+'-'+uid()+'-'+uid();
}
function setCloudStatus(text){
  const el = document.getElementById('cloudSyncStatus');
  if(el) el.textContent = text;
  const badge = document.getElementById('cloudBadge');
  if(badge) badge.textContent = text;
}
async function pushToCloud(){
  if(!cloudSyncConfigured() || !DATA.settings.cloudSync.enabled) return;
  try{
    setCloudStatus('Syncing…');
    const res = await fetchWithTimeout(cloudUrl(), 8000, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(DATA),
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    setCloudStatus('Synced ✓ ' + new Date().toLocaleTimeString());
  }catch(e){
    setCloudStatus('Sync failed — will retry on next change. (' + (e.message||'network error') + ')');
  }
}
function scheduleCloudPush(){
  if(!cloudSyncConfigured() || !DATA.settings.cloudSync.enabled) return;
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(pushToCloud, 800);
}
// Make sure the very last change actually reaches the cloud even if the tab
// closes right after — a pending debounced push would otherwise be lost,
// leaving the next device to open the file without the latest data.
function flushCloudSyncOnExit(){
  if(!cloudSyncConfigured() || !DATA.settings.cloudSync.enabled) return;
  if(!cloudSyncTimer) return; // nothing pending
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = null;
  try{
    fetch(cloudUrl(), {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(DATA),
      keepalive: true,
    });
  }catch(e){ /* best effort — nothing more we can do on the way out */ }
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='hidden'){ flushCloudSyncOnExit(); flushSheetSyncOnExit(); }
});
window.addEventListener('pagehide', ()=>{ flushCloudSyncOnExit(); flushSheetSyncOnExit(); });
async function pullFromCloud(){
  if(!cloudSyncConfigured()) return null;
  try{
    const res = await fetchWithTimeout(cloudUrl(), 8000);
    if(!res.ok) return null;
    const json = await res.json();
    return json && typeof json==='object' ? json : null;
  }catch(e){
    return null;
  }
}
// Runs once at startup: if the cloud copy is newer than what's on this device,
// adopt it. If this device has never synced (or is ahead), push local up instead.
async function initCloudSync(){
  if(!cloudSyncConfigured() || !DATA.settings.cloudSync.enabled) return;
  setCloudStatus('Checking for cloud data…');
  const cloud = await pullFromCloud();
  if(cloud && (!DATA.updatedAt || (cloud.updatedAt && cloud.updatedAt > DATA.updatedAt))){
    const myCloudSyncSettings = DATA.settings.cloudSync;
    DATA = normalizeData(cloud);
    DATA.settings.cloudSync = myCloudSyncSettings; // keep this device's connection info authoritative
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }catch(e){}
    setCloudStatus('Pulled latest data from the cloud ✓');
    render();
  } else if(!cloud){
    setCloudStatus('No cloud data yet — pushing this device\'s data up...');
    await pushToCloud();
  } else {
    setCloudStatus('This device is already up to date ✓');
  }
}

// ============================================================
// GOOGLE SHEETS BACKUP (automatic, one-way) — a free Google Apps Script
// "Web App" (set up once by the user in their own Google account) receives
// the full data as JSON and writes it into a Google Sheet: one tab with the
// exact JSON blob (for perfect restore) plus one readable tab per module
// (Events, Income, Expenses, Investments, Staff, SalaryPayments, Partners)
// so it's also human-browsable. Every save() auto-pushes here in the
// background, same debounce pattern as Cloud Sync. Restore is a manual
// button — you only ever use it after actually losing local data.
// Content-Type is deliberately 'text/plain' on the POST: it keeps the
// request a CORS "simple request" (no preflight OPTIONS), which Apps
// Script Web Apps don't handle. The Apps Script side still JSON.parses
// the body regardless of the declared content type.
// ============================================================
let sheetSyncTimer = null;
function sheetSyncConfigured(){
  const ss = DATA.settings && DATA.settings.sheetSync;
  return !!(ss && ss.url);
}
function setSheetStatus(text){
  const el = document.getElementById('sheetSyncStatus');
  if(el) el.textContent = text;
}
async function pushToSheet(){
  if(!sheetSyncConfigured() || !DATA.settings.sheetSync.enabled) return;
  try{
    setSheetStatus('Backing up…');
    const res = await fetchWithTimeout(DATA.settings.sheetSync.url, 15000, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'backup', data: DATA}),
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    setSheetStatus('Backed up to Google Sheet ✓ ' + new Date().toLocaleTimeString());
  }catch(e){
    setSheetStatus('Backup failed — will retry on next change. (' + (e.message||'network error') + ')');
  }
}
function scheduleSheetPush(){
  if(!sheetSyncConfigured() || !DATA.settings.sheetSync.enabled) return;
  clearTimeout(sheetSyncTimer);
  sheetSyncTimer = setTimeout(pushToSheet, 2000);
}
function flushSheetSyncOnExit(){
  if(!sheetSyncConfigured() || !DATA.settings.sheetSync.enabled) return;
  if(!sheetSyncTimer) return;
  clearTimeout(sheetSyncTimer);
  sheetSyncTimer = null;
  try{
    fetch(DATA.settings.sheetSync.url, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'backup', data: DATA}),
      keepalive: true,
    });
  }catch(e){ /* best effort */ }
}
// Pulls the last full backup down from the Sheet and overwrites local data.
// Only ever called manually (Settings → "Restore from Sheet"), after the
// user confirms — this is a destructive, deliberate recovery action.
async function restoreFromSheet(){
  if(!sheetSyncConfigured()){
    alert('Enter your Apps Script Web App URL first.');
    return false;
  }
  try{
    setSheetStatus('Fetching backup…');
    const res = await fetchWithTimeout(DATA.settings.sheetSync.url + '?action=restore', 15000);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if(!json || !json.ok || !json.data){
      setSheetStatus('No backup found on that Sheet yet.');
      alert('No backup data found on that Google Sheet yet.');
      return false;
    }
    const mySheetSync = DATA.settings.sheetSync;
    const myCloudSync = DATA.settings.cloudSync;
    DATA = normalizeData(json.data);
    DATA.settings.sheetSync = mySheetSync; // keep this device's connection info authoritative
    DATA.settings.cloudSync = myCloudSync;
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }catch(e){}
    setSheetStatus('Restored from Google Sheet ✓ ' + new Date().toLocaleTimeString());
    render();
    return true;
  }catch(e){
    setSheetStatus('Restore failed. (' + (e.message||'network error') + ')');
    alert('Could not reach the Google Sheet. Check the URL and your internet connection.');
    return false;
  }
}

// ---------- Login / partner session ----------
// Each device remembers which partner is using it, separately from the
// synced business data itself — this is a lightweight identity check
// (name + PIN), not real account security, so every entry can be tagged
// with who made it and expenses can require the other partner's approval.
const CURRENT_USER_KEY = 'streambiz_current_user';
function getCurrentUser(){
  try{ return localStorage.getItem(CURRENT_USER_KEY) || null; }catch(e){ return null; }
}
function setCurrentUser(name){
  try{
    if(name) localStorage.setItem(CURRENT_USER_KEY, name);
    else localStorage.removeItem(CURRENT_USER_KEY);
  }catch(e){}
}
function isLoggedIn(){
  const u = getCurrentUser();
  return !!(u && partnerByName(u));
}
function approvalEnabled(){
  return DATA.partners.length >= 2;
}
// Stamps a record with who created/last edited it. Pass the existing record
// (if editing) so createdBy/createdAt are preserved across edits.
function stampAudit(rec, existing){
  const user = getCurrentUser() || 'Unknown';
  const now = Date.now();
  rec.createdBy = existing ? (existing.createdBy || user) : user;
  rec.createdAt = existing ? (existing.createdAt || now) : now;
  rec.updatedBy = user;
  rec.updatedAt = now;
  return rec;
}
function auditNote(rec){

// ---------- YouTube integration ----------
function extractYoutubeId(url){
  if(!url) return null;
  url = url.trim();
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtube\.com\/live\/|youtube\.com\/shorts\/|youtube\.com\/embed\/|youtu\.be\/)([A-Za-z0-9_-]{6,})/,
  ];
  for(const p of patterns){
    const m = url.match(p);
    if(m) return m[1].split(/[?&]/)[0];
  }
  // fallback: maybe they pasted the raw ID
  if(/^[A-Za-z0-9_-]{6,}$/.test(url)) return url;
  return null;
}
function secondsToViews(n){
  n = Number(n)||0;
  if(n>=10000000) return (n/10000000).toFixed(1)+'Cr';
  if(n>=100000) return (n/100000).toFixed(1)+'L';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

// Best-effort date extraction from free text (video titles often carry the event date)
const MONTH_MAP = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
function toIso(y,m,d){
  y=Number(y); m=Number(m); d=Number(d);
  if(m<1||m>12||d<1||d>31) return null;
  const dt = new Date(Date.UTC(y,m-1,d));
  if(dt.getUTCFullYear()!==y || dt.getUTCMonth()!==m-1 || dt.getUTCDate()!==d) return null;
  return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}
function parseDateFromText(text){
  if(!text) return null;
  const t = text;
  let m;
  // ISO: 2026-07-06
  if(m = t.match(/\b(20\d{2})[-\/](\d{1,2})[-\/](\d{1,2})\b/)) {
    const iso = toIso(m[1],m[2],m[3]); if(iso) return iso;
  }
  // 6 July 2026 / 6th July, 2026
  if(m = t.match(/\b(\d{1,2})(?:st|nd|rd|th)?\s+([A-Za-z]{3,9})\.?,?\s+(20\d{2})\b/)) {
    const mo = MONTH_MAP[m[2].slice(0,3).toLowerCase()];
    if(mo){ const iso = toIso(m[3],mo,m[1]); if(iso) return iso; }
  }
  // July 6, 2026 / July 6th 2026
  if(m = t.match(/\b([A-Za-z]{3,9})\.?\s+(\d{1,2})(?:st|nd|rd|th)?,?\s+(20\d{2})\b/)) {
    const mo = MONTH_MAP[m[1].slice(0,3).toLowerCase()];
    if(mo){ const iso = toIso(m[3],mo,m[2]); if(iso) return iso; }
  }
  // DD/MM/YYYY or DD-MM-YYYY (day-first, common outside the US)
  if(m = t.match(/\b(\d{1,2})[\/\-](\d{1,2})[\/\-](20\d{2})\b/)) {
    const iso = toIso(m[3],m[2],m[1]); if(iso) return iso;
  }
  return null;
}

// Best-effort venue/location extraction from a video description — livestream
// descriptions very commonly include a labelled venue/address line or a 📍 pin.
// Bounded on newlines, pipes/bullets, and any trailing URL so a flattened
// (no-newline) description doesn't cause the match to swallow the rest of the text.
function parseLocationFromText(text){
  if(!text) return null;
  const patterns = [
    /📍\s*([^\n|•]+)/,
    /\bvenue\s*[:\-]\s*([^\n|•]+)/i,
    /\blocation\s*[:\-]\s*([^\n|•]+)/i,
    /\baddress\s*[:\-]\s*([^\n|•]+)/i,
    /\bheld\s+at\s+([^\n.|•]{3,90})/i,
  ];
  for(const p of patterns){
    const m = text.match(p);
    if(m && m[1]){
      let loc = m[1].trim();
      const urlIdx = loc.search(/https?:\/\//i);
      if(urlIdx >= 0) loc = loc.slice(0, urlIdx).trim();
      loc = loc.replace(/[\s,;-]+$/,'').replace(/\s+/g,' ').slice(0,120).trim();
      if(loc) return loc;
    }
  }
  return null;
}

// Event category detection from free text (title + description). This uses a
// built-in vocabulary of common event words (wedding, birthday, funeral, etc.)
// so it works immediately without the user having to pre-create categories —
// any category it detects gets added to the user's list automatically via
// ensureEventType() if it isn't there yet.
const TITLE_CATEGORY_KEYWORDS = [
  ['Wedding', ['wedding','shaadi','vivah','bride','groom','engagement','baraat','mehendi','sangeet']],
  ['Roce', ['roce']],
  ['Birthday', ['birthday','bday','janamdin']],
  ['Funeral', ['funeral','condolence','memorial service','death anniversary','shraddha','last rites','obituary']],
  ['Church Event', ['church','mass','sunday service','choir','baptism','holy communion','confirmation','feast day','parish']],
  ['Religious', ['puja','pooja','satsang','katha','kirtan','temple','navratri','ganpati','ganesh','durga','bhandara','yatra','aarti','havan']],
  ['Sports', ['match','tournament','cricket','football','marathon','sports day','championship','kabaddi','race','sports event']],
  ['Concert', ['concert','live music','music show','gig','musical night','band performance','singing show']],
  ['Conference', ['conference','summit','seminar','webinar','convention','panel discussion']],
  ['Corporate', ['corporate','annual day','product launch','company event','award ceremony','felicitation','inauguration']],
];
function detectEventType(text){
  if(!text) return null;
  const lower = text.toLowerCase();
  for(const [label, keywords] of TITLE_CATEGORY_KEYWORDS){
    if(keywords.some(k=>lower.includes(k))){
      const existing = DATA.eventTypes.find(t=>t.toLowerCase()===label.toLowerCase());
      return existing || label;
    }
  }
  // Fall back to matching any category name the user has already added themselves.
  for(const type of DATA.eventTypes){
    if(lower.includes(type.toLowerCase())) return type;
  }
  return null;
}
// If the detected label isn't already in the user's category list, add it
// (keeping the list fully user-editable, just auto-populated as it's used).
function ensureEventType(label){
  if(!label) return label;
  const existing = DATA.eventTypes.find(t=>t.toLowerCase()===label.toLowerCase());
  if(existing) return existing;
  DATA.eventTypes.push(label);
  save();
  return label;
}
// Weak fallback: YouTube's own upload category.
const GENRE_TO_TYPE = { 'Music':'Concert', 'Sports':'Sports' };
function genreToUserType(genre){
  return GENRE_TO_TYPE[genre] || null;
}

function decodeHtmlEntities(str){
  const ta = document.createElement('textarea');
  ta.innerHTML = str;
  return ta.value;
}

// Fetch with a hard timeout so a slow/unreachable proxy can never hang the UI.
function fetchWithTimeout(url, ms, opts){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), ms);
  return fetch(url, {...(opts||{}), signal: controller.signal}).finally(()=>clearTimeout(timer));
}

// No-API-key enrichment: read the public watch page (via a CORS proxy) for its
// exact upload date, description and category. This is the slow part (proxies
// can take several seconds or time out), so it is ALWAYS run in the background
// after the fast baseline result is already shown — never awaited up front.
const CORS_PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
];
async function fetchWatchPageMeta(id){
  const watchUrl = 'https://www.youtube.com/watch?v=' + id;
  for(const buildProxyUrl of CORS_PROXIES){
    try{
      const res = await fetchWithTimeout(buildProxyUrl(watchUrl), 5000);
      if(!res.ok) continue;
      const html = await res.text();
      if(!html || html.length < 500) continue;
      const dateMatch = html.match(/itemprop="datePublished"\s+content="([^"]+)"/);
      const genreMatch = html.match(/itemprop="genre"\s+content="([^"]+)"/);

      // Prefer the raw description embedded in the page's JSON data — it keeps
      // real line breaks (as escaped \n), unlike the <meta name="description">
      // tag, which YouTube flattens to a single line and previously caused
      // venue/location matches to run on past the actual venue text.
      let description = '';
      const jsonDescMatch = html.match(/"shortDescription":"((?:\\.|[^"\\])*)"/);
      if(jsonDescMatch){
        try{ description = JSON.parse('"' + jsonDescMatch[1] + '"'); }catch(e){ description = ''; }
      }
      if(!description){
        const descMatch = html.match(/<meta\s+name="description"\s+content="([^"]*)"/);
        if(descMatch) description = decodeHtmlEntities(descMatch[1]);
      }

      if(!dateMatch && !genreMatch && !description) continue;
      return {
        date: dateMatch ? dateMatch[1] : '',
        genre: genreMatch ? genreMatch[1] : '',
        description,
      };
    }catch(e){ /* try next proxy */ }
  }
  return null;
}

// Fast path only: oEmbed (title/channel/thumbnail, ~1-2s) or the official API if a
// key is set. Never waits on the slow page-scrape — that happens afterward, in the
// background, via refineWithPageScrape().
async function fetchYoutubeDetails(url){
  const id = extractYoutubeId(url);
  if(!id) throw new Error('Could not find a video ID in that link. Paste a full YouTube URL (e.g. https://www.youtube.com/watch?v=...).');
  const apiKey = (DATA.settings && DATA.settings.youtubeApiKey) || '';

  let result;
  if(apiKey){
    const endpoint = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=${encodeURIComponent(apiKey)}`;
    const res = await fetchWithTimeout(endpoint, 8000);
    if(!res.ok) throw new Error('YouTube API request failed (' + res.status + '). Check your API key in Backup / Settings.');
    const json = await res.json();
    if(!json.items || !json.items.length) throw new Error('No video found for that link. Double-check the URL.');
    const item = json.items[0];
    const sn = item.snippet || {};
    const st = item.statistics || {};
    result = {
      id,
      title: sn.title || '',
      date: (sn.publishedAt || '').slice(0,10),
      channelName: sn.channelTitle || '',
      description: sn.description || '',
      viewCount: st.viewCount ? Number(st.viewCount) : null,
      likeCount: st.likeCount ? Number(st.likeCount) : null,
      thumbnailUrl: (sn.thumbnails && (sn.thumbnails.medium||sn.thumbnails.default||{}).url) || '',
      source: 'api',
    };
  } else {
    const oembedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent('https://www.youtube.com/watch?v='+id)}&format=json`;
    const res = await fetchWithTimeout(oembedUrl, 8000);
    if(!res.ok) throw new Error('Could not reach YouTube. Check your internet connection.');
    const json = await res.json();
    result = {
      id,
      title: json.title || '',
      date: '',
      channelName: json.author_name || '',
      description: '',
      viewCount: null,
      likeCount: null,
      thumbnailUrl: json.thumbnail_url || '',
      source: 'oembed',
    };
  }

  const combinedText = (result.title||'') + ' ' + (result.description||'');
  result.dateGuess = result.date ? null : parseDateFromText(combinedText);
  result.detectedType = detectEventType(combinedText) || null;
  result.location = parseLocationFromText(result.description) || null;
  return result;
}

// Slow enrichment, called AFTER the form is already filled in. Resolves to
// {date, detectedType, location} patches, or null if nothing useful came back / it timed out.
async function refineWithPageScrape(id, currentCombinedText){
  const meta = await fetchWatchPageMeta(id);
  if(!meta) return null;
  const patch = {};
  if(meta.date) patch.date = meta.date;
  if(meta.description){
    const richerText = currentCombinedText + ' ' + meta.description;
    const betterType = detectEventType(richerText) || genreToUserType(meta.genre) || null;
    if(betterType) patch.detectedType = betterType;
    const loc = parseLocationFromText(meta.description);
    if(loc) patch.location = loc;
  } else if(genreToUserType(meta.genre)){
    patch.detectedType = genreToUserType(meta.genre);
  }
  return Object.keys(patch).length ? patch : null;
}

function bookValue(inv){
  const years = Number(inv.usefulLifeYears)||0;
  const cost = Number(inv.cost)||0;
  if(years<=0) return cost;
  const purchased = new Date(inv.date);
  const now = new Date();
  const ageYears = (now - purchased) / (1000*60*60*24*365.25);
  const dep = Math.min(1, Math.max(0, ageYears/years));
  return Math.max(0, cost * (1-dep));
}

function viewDashboard(){
  const approvedExp = approvedExpenses();
  const inc = totalIncome(DATA.income);
  const exp = totalExpenses(approvedExp);
  const invCost = approvedInvestments().reduce((s,i)=>s+Number(i.cost||0),0);
  const salPaid = DATA.salaryPayments.reduce((s,p)=>s+Number(p.amount||0),0);
  const net = inc - exp - salPaid;
  // Money actually left in the bank: income minus every rupee that left the
  // business's own cash — expenses, salaries, and any investment paid for out
  // of profit. Investments funded directly by a partner's own money are NOT
  // subtracted here, since that cash never came out of the business account.
  const profitFundedInvestments = approvedInvestments()
    .filter(i=>i.fundingSource==='profit')
    .reduce((s,i)=>s+Number(i.cost||0),0);
  const bankBalance = inc - exp - salPaid - profitFundedInvestments;

  const now = new Date();
  const thisMonthKey = now.toISOString().slice(0,7);
  const monthIncome = DATA.income.filter(r=>monthKey(r.date)===thisMonthKey).reduce((s,r)=>s+Number(r.amount||0),0);
  const monthExpense = approvedExp.filter(r=>monthKey(r.date)===thisMonthKey).reduce((s,r)=>s+Number(r.amount||0),0);
  const monthSalary = DATA.salaryPayments.filter(r=>monthKey(r.date)===thisMonthKey).reduce((s,r)=>s+Number(r.amount||0),0);

  // last 6 months trend
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(d.toISOString().slice(0,7));
  }
  const trend = months.map(mk=>{
    const i = DATA.income.filter(r=>monthKey(r.date)===mk).reduce((s,r)=>s+Number(r.amount||0),0);
    const e = approvedExp.filter(r=>monthKey(r.date)===mk).reduce((s,r)=>s+Number(r.amount||0),0)
            + DATA.salaryPayments.filter(r=>monthKey(r.date)===mk).reduce((s,r)=>s+Number(r.amount||0),0);
    return {mk, i, e};
  });
  const maxVal = Math.max(1, ...trend.map(t=>Math.max(t.i,t.e)));

  // profit per event
  const eventProfits = DATA.events.map(ev=>{
    const i = DATA.income.filter(r=>r.eventId===ev.id).reduce((s,r)=>s+Number(r.amount||0),0);
    const e = approvedExp.filter(r=>r.eventId===ev.id).reduce((s,r)=>s+Number(r.amount||0),0);
    return {ev, profit: i-e, income:i, expense:e};
  }).sort((a,b)=>b.profit-a.profit);

  const recent = [
    ...DATA.income.map(r=>({...r, kind:'income'})),
    ...approvedExp.map(r=>({...r, kind:'expense'})),
    ...DATA.salaryPayments.map(r=>({...r, kind:'expense', category:'Salary', description:'Salary: '+staffName(r.staffId)})),
  ].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8);

  return `
    <h1>Dashboard</h1>
    <div class="subtitle">Overview of your livestream event business</div>

    <div class="cards">
      <div class="card"><div class="label">Total Income (all time)</div><div class="value pos">${fmt(inc)}</div></div>
      <div class="card"><div class="label">Total Expenses (all time)</div><div class="value neg">${fmt(exp+salPaid)}</div></div>
      <div class="card"><div class="label">Net Profit (all time)</div><div class="value ${net>=0?'pos':'neg'}">${fmt(net)}</div></div>
      <div class="card"><div class="label">Investment Value (cost)</div><div class="value">${fmt(invCost)}</div></div>
      <div class="card"><div class="label">Money at Bank (Remaining)</div><div class="value ${bankBalance>=0?'pos':'neg'}">${fmt(bankBalance)}</div></div>
    </div>

    <div class="cards">

      try{

function bindEventForm(ev){
  document.getElementById('cancelBtn').onclick = closeModal;

  const typeSelect = document.getElementById('f_type');
  let lastTypeValue = typeSelect.value;
  typeSelect.addEventListener('change', ()=>{
    if(typeSelect.value === '__add_new__'){
      const name = prompt('New category name:');
      const trimmed = (name||'').trim();
      if(trimmed){
        if(!DATA.eventTypes.some(t=>t.toLowerCase()===trimmed.toLowerCase())){
          DATA.eventTypes.push(trimmed);
          save();
        }
        typeSelect.innerHTML = eventTypeOptionsHtml(trimmed);
        typeSelect.value = trimmed;
        lastTypeValue = trimmed;
      } else {
        typeSelect.value = lastTypeValue;
      }
    } else {
      lastTypeValue = typeSelect.value;
    }
  });

  document.getElementById('fetchYtBtn').onclick = async ()=>{
    const url = document.getElementById('f_yturl').value.trim();
    const statusEl = document.getElementById('ytStatus');
    if(!url){ alert('Paste a YouTube link first.'); return; }
    const btn = document.getElementById('fetchYtBtn');
    btn.disabled = true; btn.textContent = 'Fetching...';
    statusEl.textContent = 'Looking up video details...';
    try{
      const info = await fetchYoutubeDetails(url); // fast: resolves in ~1-2s
      const noteBits = [];
      if(info.title) document.getElementById('f_name').value = info.title;

      if(info.date){
        document.getElementById('f_date').value = info.date;
        noteBits.push('date from YouTube');
      } else if(info.dateGuess){
        document.getElementById('f_date').value = info.dateGuess;
        noteBits.push('date guessed from title');
      }

      if(info.detectedType){
        const sel = document.getElementById('f_type');
        const canonical = ensureEventType(info.detectedType);
        if(![...sel.options].some(o=>o.value===canonical)){
          sel.innerHTML = eventTypeOptionsHtml(canonical);
        }
        sel.value = canonical;
        lastTypeValue = canonical;
        noteBits.push('category guessed from title: ' + canonical);
      }

      const locEl = document.getElementById('f_location');
      if(info.location && !locEl.value.trim()){
        locEl.value = info.location;
        noteBits.push('location from description');
      }

      document.getElementById('f_thumb').value = info.thumbnailUrl || '';
      document.getElementById('f_channel').value = info.channelName || '';
      const preview = document.getElementById('ytPreview');
      if(info.thumbnailUrl){
        preview.style.display = '';
        preview.innerHTML = `<img src="${info.thumbnailUrl}" style="max-width:160px;border-radius:8px;display:block;">`;
      }
      const notesEl = document.getElementById('f_notes');
      const extraBits = [];
      if(info.channelName) extraBits.push('Channel: ' + info.channelName);
      if(info.viewCount!=null) extraBits.push('Views at fetch time: ' + secondsToViews(info.viewCount));
      if(extraBits.length && !notesEl.value.includes(extraBits[0])){
        notesEl.value = (notesEl.value ? notesEl.value + '\n' : '') + extraBits.join(' • ');
      }
      const base = info.source==='api' ? 'Fetched title, date & channel from YouTube (API).' : 'Fetched title' + (noteBits.length?' — filling in the rest...':'.');
      statusEl.textContent = base + (noteBits.length ? ' (' + noteBits.join(', ') + ')' : '');
      btn.disabled = false; btn.textContent = 'Fetch Details';

      // Slow part (page scrape) runs in the background so the button never hangs.
      // If it turns up a more exact date/category, upgrade the fields quietly.
      if(info.source==='oembed'){
        const combinedText = (info.title||'') + ' ' + (info.description||'');
        refineWithPageScrape(info.id, combinedText).then(patch=>{
          const dateEl = document.getElementById('f_date');
          if(!dateEl) return; // modal closed already
          const refined = [];
          if(patch && patch.date){ dateEl.value = patch.date; refined.push('exact date'); }
          if(patch && patch.detectedType){
            const sel2 = document.getElementById('f_type');
            if(sel2){
              const canonical2 = ensureEventType(patch.detectedType);
              if(![...sel2.options].some(o=>o.value===canonical2)) sel2.innerHTML = eventTypeOptionsHtml(canonical2);
              sel2.value = canonical2; lastTypeValue = canonical2; refined.push('category');
            }
          }
          if(patch && patch.location){
            const locEl2 = document.getElementById('f_location');
            if(locEl2 && !locEl2.value.trim()){ locEl2.value = patch.location; refined.push('location'); }
          }
          statusEl.textContent = refined.length
            ? 'Refined ' + refined.join(' & ') + ' from the video page.'
            : (base + (noteBits.length ? ' (' + noteBits.join(', ') + ')' : '') + ' Using title-based guesses (video page lookup was unavailable).');
        }).catch(()=>{ /* keep the title-based guesses already shown */ });
      }
    }catch(err){
      statusEl.textContent = err.message || 'Could not fetch video details.';
      btn.disabled = false; btn.textContent = 'Fetch Details';
    }
  };
  document.getElementById('saveBtn').onclick = ()=>{
    const name = document.getElementById('f_name').value.trim();
    if(!name){ alert('Please enter an event name.'); return; }
    const rec = {
      id: ev?ev.id:uid(),
      name,
      date: document.getElementById('f_date').value,
      type: document.getElementById('f_type').value,
      notes: document.getElementById('f_notes').value,
      youtubeUrl: document.getElementById('f_yturl').value.trim(),
      thumbnailUrl: document.getElementById('f_thumb').value,
      channelName: document.getElementById('f_channel').value,
      location: document.getElementById('f_location').value.trim(),
    };
    stampAudit(rec, ev);
    if(ev){
      const idx = DATA.events.findIndex(e=>e.id===ev.id);
      DATA.events[idx] = rec;
    } else {
      DATA.events.push(rec);
    }
    save(); closeModal(); render();
  };
}

// ============================================================
// EXPENSES
// ============================================================
// EXPENSE APPROVAL WORKFLOW
// When 2+ partners exist, every new/edited/deleted expense needs the OTHER
// partner's approval before it counts. New entries are excluded from every
// total/report until approved; edits keep the last-approved values live
// until approved; deletes stay live/counted until the deletion is approved.
// With fewer than 2 partners there's no one else to approve, so everything
// just saves immediately (still tagged with who did it).
// ============================================================
function approvedExpenses(){
  return DATA.expenses.filter(e=>e.status!=='pending_create');
}
function expenseStatusLabel(e){
  if(e.status==='pending_create') return 'Pending add — awaiting approval';
  if(e.status==='pending_edit') return 'Pending edit — awaiting approval';
  if(e.status==='pending_delete') return 'Pending delete — awaiting approval';
  return '';
}
function buildExpenseCreate(fields){
  const user = getCurrentUser() || 'Unknown';
  const now = Date.now();
  const gate = approvalEnabled();
  return {
    ...fields,
    id: uid(),
    status: gate ? 'pending_create' : 'approved',
    createdBy: user, createdAt: now,
    updatedBy: user, updatedAt: now,
    requestedBy: gate ? user : null,
    requestedAt: gate ? now : null,
    pendingData: null,
    approvedBy: null, approvedAt: null,
  };
}
function buildExpenseEdit(existing, fields){
  const user = getCurrentUser() || 'Unknown';
  const now = Date.now();
  if(!approvalEnabled()){
    const r = {...existing, ...fields};
    stampAudit(r, existing);
    return r;
  }
  return {
    ...existing,
    status: 'pending_edit',
    requestedBy: user,
    requestedAt: now,
    pendingData: {...fields},
  };
}
function canActOnExpense(rec){
  // Only someone other than the requester can approve/reject a pending change.
  return !!rec.requestedBy && rec.requestedBy !== getCurrentUser();
}
function approveExpense(id){
  const idx = DATA.expenses.findIndex(e=>e.id===id);
  if(idx<0) return;
  const rec = DATA.expenses[idx];
  const approver = getCurrentUser() || 'Unknown';
  if(rec.status==='pending_delete'){
    DATA.expenses.splice(idx,1);
    save();
    return;
  }
  if(rec.status==='pending_edit' && rec.pendingData){
    Object.assign(rec, rec.pendingData);
    rec.updatedBy = rec.requestedBy;
    rec.updatedAt = rec.requestedAt;
    rec.pendingData = null;
  }
  rec.status = 'approved';
  rec.approvedBy = approver;
  rec.approvedAt = Date.now();
  rec.requestedBy = null;
  rec.requestedAt = null;
  save();
}
function rejectExpense(id){
  const idx = DATA.expenses.findIndex(e=>e.id===id);
  if(idx<0) return;
  const rec = DATA.expenses[idx];

function investmentFundedByLabel(r){
  if(r.fundingSource==='profit') return 'Business Profit';
  if(r.fundingSource==='partner' && r.partner) return r.partner;
  return '—';
}
// Same approval pattern as Expenses: with 2+ partners, new/edited/deleted
// investments need the other partner's approval before they count.
function approvedInvestments(){
  return DATA.investments.filter(i=>i.status!=='pending_create');
}
function investmentStatusLabel(i){
  if(i.status==='pending_create') return 'Pending add — awaiting approval';
  if(i.status==='pending_edit') return 'Pending edit — awaiting approval';
  if(i.status==='pending_delete') return 'Pending delete — awaiting approval';
  return '';
}
function buildInvestmentCreate(fields){
  const user = getCurrentUser() || 'Unknown';
  const now = Date.now();
  const gate = approvalEnabled();
  return {
    ...fields,
    id: uid(),
    status: gate ? 'pending_create' : 'approved',
    createdBy: user, createdAt: now,
    updatedBy: user, updatedAt: now,
    requestedBy: gate ? user : null,
    requestedAt: gate ? now : null,
    pendingData: null,
    approvedBy: null, approvedAt: null,
  };
}
function buildInvestmentEdit(existing, fields){
  const user = getCurrentUser() || 'Unknown';
  const now = Date.now();
  if(!approvalEnabled()){
    const r = {...existing, ...fields};
    stampAudit(r, existing);
    return r;
  }
  return {
    ...existing,
    status: 'pending_edit',
    requestedBy: user,
    requestedAt: now,
    pendingData: {...fields},
  };
}
function canActOnInvestment(rec){
  return !!rec.requestedBy && rec.requestedBy !== getCurrentUser();
}
function approveInvestment(id){
  const idx = DATA.investments.findIndex(i=>i.id===id);
  if(idx<0) return;
  const rec = DATA.investments[idx];
  const approver = getCurrentUser() || 'Unknown';
  if(rec.status==='pending_delete'){
    DATA.investments.splice(idx,1);
    save();
    return;
  }
  if(rec.status==='pending_edit' && rec.pendingData){
    Object.assign(rec, rec.pendingData);
    rec.updatedBy = rec.requestedBy;
    rec.updatedAt = rec.requestedAt;
    rec.pendingData = null;
  }
  rec.status = 'approved';
  rec.approvedBy = approver;
  rec.approvedAt = Date.now();
  rec.requestedBy = null;
  rec.requestedAt = null;
  save();
}
function rejectInvestment(id){
  const idx = DATA.investments.findIndex(i=>i.id===id);
  if(idx<0) return;
  const rec = DATA.investments[idx];
  if(rec.status==='pending_create'){
    DATA.investments.splice(idx,1);
  } else {
    rec.status = 'approved';
    rec.pendingData = null;
    rec.requestedBy = null;
    rec.requestedAt = null;
  }
  save();
}

function inRange(dateStr, from, to){
  if(from && dateStr < from) return false;
  if(to && dateStr > to) return false;
  return true;
}
function computeReport(from, to, eventId){
  const inc = DATA.income.filter(r=>inRange(r.date,from,to) && (!eventId || r.eventId===eventId));
  const exp = approvedExpenses().filter(r=>inRange(r.date,from,to) && (!eventId || r.eventId===eventId));
  const sal = DATA.salaryPayments.filter(r=>inRange(r.date,from,to) && (!eventId || r.eventId===eventId));
  return {inc, exp, sal};
}
function renderReportBody(from, to, eventId){
  const {inc, exp, sal} = computeReport(from, to, eventId);
  const totalInc = totalIncome(inc);
  const totalExp = totalExpenses(exp) + sal.reduce((s,r)=>s+Number(r.amount||0),0);
  const net = totalInc - totalExp;

  const byIncomeCat = {};
  inc.forEach(r=>{ byIncomeCat[r.category] = (byIncomeCat[r.category]||0) + Number(r.amount||0); });
  const byExpenseCat = {};
  exp.forEach(r=>{ byExpenseCat[r.category] = (byExpenseCat[r.category]||0) + Number(r.amount||0); });
  if(sal.length) byExpenseCat['Salary'] = (byExpenseCat['Salary']||0) + sal.reduce((s,r)=>s+Number(r.amount||0),0);

  const maxIncomeCat = Math.max(1, ...Object.values(byIncomeCat));
  const maxExpenseCat = Math.max(1, ...Object.values(byExpenseCat));

  document.getElementById('reportBody').innerHTML = `
    <div class="cards">
      <div class="card"><div class="label">Total Income</div><div class="value pos">${fmt(totalInc)}</div></div>
      <div class="card"><div class="label">Total Expenses</div><div class="value neg">${fmt(totalExp)}</div></div>
      <div class="card"><div class="label">Net Profit</div><div class="value ${net>=0?'pos':'neg'}">${fmt(net)}</div></div>
    </div>
    <div class="panel">
      <h2>Income by Category</h2>
      ${Object.keys(byIncomeCat).length===0?'<div class="empty">No income in this range.</div>':
        Object.entries(byIncomeCat).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
        <div class="stat-bar-row">
          <div class="lbl">${escapeHtml(cat)}</div>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(val/maxIncomeCat*100)}%;background:#3ecf8e;"></div></div>
          <div class="stat-bar-val">${fmt(val)}</div>
        </div>`).join('')}
    </div>
    <div class="panel">
      <h2>Expenses by Category</h2>
      ${Object.keys(byExpenseCat).length===0?'<div class="empty">No expenses in this range.</div>':
        Object.entries(byExpenseCat).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
        <div class="stat-bar-row">
          <div class="lbl">${escapeHtml(cat)}</div>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(val/maxExpenseCat*100)}%;background:#ff5c5c;"></div></div>
          <div class="stat-bar-val">${fmt(val)}</div>
        </div>`).join('')}
    </div>
  `;
}
function csvEscape(v){
  v = String(v??'');
  if(/[",\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}
function downloadCsv(filename, rows){
  const csv = rows.map(row=>row.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

  document.getElementById('exportAllCsv').onclick = ()=>{

    data.sort((a,b)=>(a[0]||'').localeCompare(b[0]||''));
    downloadCsv('full_profit_and_loss.csv', [header, ...data]);

    const code = document.getElementById('cloudCode').value.trim();
    const enabled = document.getElementById('cloudEnabled').checked;
    if(enabled && (!url || !code)){
      alert('Enter both the Database URL and a Sync Code before enabling sync.');
      return;
    }
    DATA.settings.cloudSync = { url, code, enabled, locked: !document.getElementById('cloudUrl').disabled ? false : true };
    save();
    if(enabled){
      await initCloudSync();
    } else {
      setCloudStatus('Sync is off — data stays on this device only.');
    }
  };
  document.getElementById('cloudSyncNow').onclick = async ()=>{
    if(!cloudSyncConfigured()){
      alert('Enter a Database URL and Sync Code, then click "Save & Connect" first.');
      return;
    }
    setCloudStatus('Syncing…');
    await pushToCloud();
    alert('Pushed this device\'s data to the cloud.');
  };
  document.getElementById('saveSheetSync').onclick = async ()=>{
    const url = document.getElementById('sheetUrl').value.trim();
    const enabled = document.getElementById('sheetEnabled').checked;
    if(enabled && !url){
      alert('Paste your Apps Script Web App URL before enabling backup.');
      return;
    }
    DATA.settings.sheetSync = { url, enabled };

    setSheetStatus(enabled ? 'Backup is on.' : 'Backup is off — data stays on this device only.');
    if(enabled){
      await pushToSheet();
    }
  };
  document.getElementById('sheetBackupNow').onclick = async ()=>{

  document.getElementById('addTypeBtn').onclick = ()=>{

    }
    if(!/^\d{4}$/.test(pin)){
      alert('Please set a 4-digit PIN (numbers only) for this partner.');
      return;
    }
    DATA.partners.push({name, pin});
    save(); render();
  };
  document.getElementById('newPartnerInput').addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); document.getElementById('newPartnerPin').focus(); }
  });
  document.getElementById('newPartnerPin').addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); document.getElementById('addPartnerBtn').click(); }
  });
  document.querySelectorAll('[data-del-partner]').forEach(btn=>{
    btn.onclick = ()=>{
      const p = btn.dataset.delPartner;
      if(confirm(`Remove partner "${p}"? Investments already tagged to them will keep the label; it just won't be offered for new ones. If this partner is logged in on this device, they'll be logged out.`)){
        DATA.partners = DATA.partners.filter(x=>x.name!==p);
        save();
        if(getCurrentUser()===p) setCurrentUser(null);
        render();
      }
    };
  });
  document.querySelectorAll('[data-set-pin]').forEach(btn=>{
    btn.onclick = ()=>{
      const name = btn.dataset.setPin;
      const p = partnerByName(name);
      if(!p) return;
      const pin = prompt(`Set a 4-digit PIN for ${name}:`);
      if(pin===null) return;
      const trimmed = pin.trim();
      if(!/^\d{4}$/.test(trimmed)){
        alert('PIN must be exactly 4 digits.');
        return;
      }
      p.pin = trimmed;
      save(); render();
      alert(`PIN set for ${name}.`);
    };
  });
  document.getElementById('saveYtKey').onclick = ()=>{
    DATA.settings = DATA.settings || {};
    DATA.settings.youtubeApiKey = document.getElementById('ytApiKey').value.trim();
    save();
    alert('Saved. New event fetches will use this key.');
  };
  document.getElementById('exportBackup').onclick = ()=>{
    const blob = new Blob([JSON.stringify(DATA,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'glownest_media_backup_' + todayStr() + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  document.getElementById('importFile').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        if(!confirm('This will REPLACE all current data with the backup file. Continue?')) return;
        DATA = normalizeData(parsed);
        save(); render();
        alert('Backup restored successfully.');
      }catch(err){
        alert('Could not read this file. Make sure it is a valid Glownest Media backup JSON.');
      }
    };
    reader.readAsText(file);
  };
  document.getElementById('wipeData').onclick = ()=>{
    if(confirm('This will permanently erase ALL data in this app. This cannot be undone. Continue?')){
      if(confirm('Are you absolutely sure? Consider exporting a backup first.')){
        DATA = blankData();
        save(); render();
      }
    }
  };
}

// ---------- Init ----------
render();
if(DATA.settings.cloudSync && DATA.settings.cloudSync.enabled){
  setCloudStatus('☁ Checking sync…');
}
initCloudSync();
</script>
</body>
</html>
